<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancelmo's Machine</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="styles/style.css">

</head>

<body>

       
    <img id="img-title" src="assets/title.png" alt="">


    <div class="custom-ascii">
        <a href="ascii-machine.html"><button>Tabela ASCII</button></a>
    </div>
    

            <section class="background">
                <section class="left-section">
                    
                    <h2 id="h2-number" class="cursor typewriter-animation">Insira o número respectivo!</h2>
                    
                    <div class="readings">
                        <h3>Digite um número Decimal:</h3>
                        <input id="ipt_decimal" type="text" placeholder="Ex: 42">
                    </div>
                    
                <div class="readings">
                    <h3>Digite um número Octal:</h3>
                    <input id="ipt_octal" type="text" placeholder="Ex: 142">
                </div>
                
                <div class="readings">
                    <h3>Digite um número Binário:</h3>
                    <input id="ipt_binario" type="text" placeholder="Ex: 101">
                </div>

                <div class="readings">
                    <h3>Digite um número Hexadecimal:</h3>
                    <input id="ipt_hexa" type="text" placeholder="Ex: 1F">
                </div>
                
                <button onclick="converter()">Converter</button>
                
            </section>
            
            <section class="right-section">
                
                <h3 class="cursor typewriter-animation" id="result">Resultados:</h3>
                
                <div class="result-div" id="demo2"></div>
                
                
                <div class="result-div" id="demo3"></div>
                
                
                <div class="result-div" id="demo4"></div>
                    
                
                <div class="result-div" id="demo5"></div>
                
                
                <div class="result-div" id="exibirAviso"></div>
                
                <button onclick="limpar()">Limpar</button>
            </section>
        </section>

    <h2><a class="dev" href="https://github.com/AncelmoSilva10/ancelmo-machine">Desenvolvido por: Ancelmo Silva de Sousa<i class="fa-brands fa-github"></i></a></h2>
        


    <script>
        function converter() {
        var decimal = Number(ipt_decimal.value);
        var octal = Number(ipt_octal.value);
        var binario = Number(ipt_binario.value);
        var hexadecimal = ipt_hexa.value;


        const regexBinario = new RegExp("^[01]+$");
        const regexOctal = new RegExp("^[0-7]+$"); 
        const regexDecimal = new RegExp("^[0-9]+$");
        const regexHexa = new RegExp("^[0-9A-Fa-f]+$");

            
        let verificarBinario = regexBinario.test(binario);
        let verificarOctal = regexOctal.test(octal);
        let verificarDecimal = regexDecimal.test(decimal);
        let verificarHexadecimal = regexHexa.test(hexadecimal);      

        if(decimal != "" &&octal == "" && binario == "" && hexadecimal == ""){

            if(verificarDecimal){

               demo2.innerHTML = `O número ${decimal} em <b>OCTAL</b> é ${decimal.toString(8)}`;
               demo3.innerHTML = `O número ${decimal} em <b>HEXADECIMAL</b> é ${decimal.toString(16).toUpperCase()}`;
                demo4.innerHTML = `O número ${decimal} em <b>BINÁRIO</b> é ${decimal.toString(2)}`;
                demo5.innerHTML = `O número ${decimal} em <b>DECIMAL</b> é ${decimal}`;

            }else{
                exibirAviso.innerHTML = `Insira um número Decimal Válido!`;
            }

           
            }else if(octal != "" && decimal == "" && binario == "" && hexadecimal == ""){


                if(verificarOctal){

                let decimalTransformado = parseInt(octal, 8);

                demo2.innerHTML = `O número em <b>OCTAL</b> é ${octal}`;
                demo3.innerHTML = `O número ${decimalTransformado} em <b>HEXADECIMAL</b> é ${decimalTransformado.toString(16).toUpperCase()}`;
                demo4.innerHTML = `O número ${decimalTransformado} em <b>BINÁRIO</b> é ${decimalTransformado.toString(2)}`;
                demo5.innerHTML = `O número em <b>DECIMAL</b> é ${decimalTransformado}`;

                }else{
                exibirAviso.innerHTML = `Insira um número Octal Válido!`;
                }
               

            }else if(binario != "" && decimal == "" && hexadecimal == "" && octal == ""){

                if(verificarBinario){

                let decimalTransformado = parseInt(binario, 2);

                demo2.innerHTML = `O número ${decimalTransformado} em <b>OCTAL</b> é ${decimalTransformado.toString(8)}`;
                demo3.innerHTML = `O número ${decimalTransformado} em <b>HEXADECIMAL</b> é ${decimalTransformado.toString(16).toUpperCase()}`;
                demo4.innerHTML = `O número em <b>BINÁRIO</b> é ${binario}`;
                demo5.innerHTML = `O número em <b>DECIMAL</b> é ${decimalTransformado}`;

                }else{
                exibirAviso.innerHTML = `Insira um número Binário Válido!`;
                }

              

            }else if(hexadecimal !="" && binario == "" && decimal == "" && octal == ""){

                if(verificarHexadecimal){

                let decimalTransformado = parseInt(hexadecimal, 16);

                demo2.innerHTML = `O número ${decimalTransformado} em <b>OCTAL</b> é ${decimalTransformado.toString(8)}`;
                demo3.innerHTML = `O número em <b>HEXADECIMAL</b> é ${hexadecimal.toUpperCase()}`;
                demo4.innerHTML = `O número ${decimalTransformado} em <b>BINÁRIO</b> é ${decimalTransformado.toString(2)}`;
                demo5.innerHTML = `O número em <b>DECIMAL</b> é ${decimalTransformado}`;

                }else{
                    exibirAviso.innerHTML = `Insira um número Hexadecimal Válido!`;
                }

            }else if(hexadecimal =="" && binario == "" && decimal == "" && octal == ""){
                exibirAviso.innerHTML = `Insira um valor para ser convertido!`;
            }else{
                exibirAviso.innerHTML = `Apenas preencha um campo por vez para conversão, deixando os outros vazios!`;
            }

        
        }


        function limpar(){

            
            ipt_binario.value = "";
            ipt_octal.value = "";
            ipt_decimal.value = "";
            ipt_hexa.value = "";
            demo2.innerHTML = "";
            demo3.innerHTML = "";
            demo4.innerHTML = "";
            demo5.innerHTML = "";
            exibirAviso.innerHTML = "";
            
        }
    </script>
</body>
</html>
